<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>年齢別プラン・キャンペーン</title>
  <link rel="stylesheet" href="style.css">
  <style>
    html,
    body {
      overscroll-behavior-y: auto;
    }

    body {
      padding: 20px 16px 40px;
    }

    .birth-select-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .birth-select-row select {
      flex: 1;
      min-width: 0;
    }

    #birth-age-display {
      display: none;
      margin-top: 12px;
      font-weight: 700;
      font-size: 1rem;
      color: var(--primary-color);
    }

    #age-no-match {
      display: none;
      color: var(--text-sub);
      font-size: 0.9rem;
      padding: 8px 4px;
    }

    #age-year-oob-message {
      display: none;
      margin-top: 12px;
      color: var(--primary-color);
      font-weight: 700;
      font-size: 0.9rem;
      padding: 8px 4px;
    }


    .plan-result-card {
      border-left-width: 6px;
      border-left-style: solid;
      padding: 0;
      overflow: hidden;
    }

    .plan-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      border: none;
      background: transparent;
      margin: 0;
      padding: 16px;
      font: inherit;
      text-align: left;
      cursor: pointer;
      color: inherit;
    }

    .plan-card-header:focus-visible {
      outline: 2px solid var(--primary-color);
      outline-offset: -2px;
    }

    .plan-card-chevron {
      margin-left: auto;
      flex-shrink: 0;
      font-size: 0.8rem;
      color: var(--text-sub);
      transition: transform 0.2s ease;
    }

    .plan-card-header[aria-expanded="true"] .plan-card-chevron {
      transform: rotate(180deg);
    }

    .plan-card-body {
      display: none;
      padding: 0 16px 16px;
    }

    .plan-card-total-memo {
      display: none;
    }

    .result-card-carrier {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .result-card-name {
      flex: 1;
      min-width: 0;
      font-size: 1.1rem;
      font-weight: 700;
      color: #111;
    }

    .result-card-name-age {
      font-size: 0.8rem;
      font-weight: 400;
      color: var(--text-sub);
      margin-left: 4px;
    }

    .result-card-age {
      font-size: 0.85rem;
      color: var(--text-sub);
      margin-top: -6px;
      margin-bottom: 12px;
    }

    .plan-sub-title {
      margin: 0 0 10px 0;
      font-size: 0.95rem;
      color: #555;
      font-weight: 700;
    }

    .no-discount-note {
      color: #888;
      font-size: 0.88rem;
    }

    .checkbox-label input[type="radio"] {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      accent-color: var(--primary-color);
    }

    .discount-master-label {
      font-weight: 700;
      margin-bottom: 10px;
    }

    .discount-options .checkbox-label:has(input:disabled) {
      opacity: 0.5;
    }

    .discount-options {
      padding-left: 1em;
    }

    #age-call-benefit-card .program-notice-box {
      margin-top: 0;
      margin-bottom: 10px;
    }

    #age-call-benefit-card .program-notice-box:last-child {
      margin-bottom: 0;
    }
    h1 {
      margin-top: 40px;
    }

    .age-overview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .age-overview-header h2 {
      margin: 0;
    }

    .age-overview-toggle-btn {
      flex-shrink: 0;
      border: 1px solid var(--border-color);
      background: #fff;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--primary-color);
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>年齢特典プラン・キャンペーン検索</h2>
    <div class="card">
      <h2>年齢を入力して検索</h2>
      <div class="checkbox-group" style="margin-bottom:14px;">
        <label class="checkbox-label">
          <input type="radio" name="age-input-mode" value="birth" checked onchange="onAgeInputModeChange()">
          生年月日で入力
        </label>
        <label class="checkbox-label">
          <input type="radio" name="age-input-mode" value="direct" onchange="onAgeInputModeChange()">
          年齢を直接入力
        </label>
      </div>

      <div id="birth-input-section">
        <div class="birth-select-row">
          <select id="birth-year" onchange="onBirthChange()" onkeydown="jumpToPlanResults(event)"></select>
          <select id="birth-month" onchange="onBirthChange()" onkeydown="jumpToPlanResults(event)"></select>
          <select id="birth-day" onchange="onBirthChange()" onkeydown="jumpToPlanResults(event)"></select>
        </div>
        <div id="age-year-oob-message">選択した年では対象となるプラン・キャンペーンがないため、月日は選択できません</div>
      </div>

      <div id="direct-age-input-section" style="display:none;">
        <div class="section" style="margin-bottom:0;">
          <label for="direct-age-input">年齢:</label>
          <input type="number" id="direct-age-input" min="0" max="120" placeholder="満年齢を入力" oninput="onDirectAgeChange()" onkeydown="jumpToPlanResults(event)">
        </div>
      </div>

      <div id="birth-age-display"></div>
    </div>

    <div class="card">
      <div class="age-overview-header">
        <h2>年齢プラン一覧</h2>
        <button type="button" class="age-overview-toggle-btn" id="age-overview-toggle-btn" aria-expanded="false" aria-controls="age-plan-overview-list" onclick="toggleAgePlanOverviewList()">開く ▼</button>
      </div>
      <div id="age-plan-overview-list" class="result-container" style="display:none;"></div>
    </div>

    <div id="age-results-section" style="display:none;">
      <div class="card">
        <h2>加入可能プラン一覧</h2>
        <div id="age-plan-list" class="result-container"></div>
        <div id="age-no-match">契約可能なプラン・キャンペーンがありません</div>
      </div>

      <div id="age-call-benefit-card" class="card" style="display:none;">
        <h2>対象の通話特典</h2>
        <div id="age-call-benefit-list"></div>
      </div>
    </div>
  </div>

  <script>
    // =======================================================================================================================
    // 📱 年齢別プランデータ（carrierdata.xlsx Sheet5 セクション1「年齢別プラン・キャンペーン」より）
    // =======================================================================================================================
    // キャリアごとの固定カラー（search.html と統一）
    const carrierColor = {
      docomo: "#ff0000",
      au: "#f57c00",
      UQ: "#7b1fa2",
      softbank: "#9e9e9e",
      Rakuten: "#ff00a7",
    };
    const carrierBgColor = {
      docomo: "#fff2f1",
      au: "#fff3e6",
      UQ: "#f3e8fb",
      softbank: "#f5f5f5",
      Rakuten: "#ffe9ef",
    };

    function buildPlanColor(carrier) {
      return {
        accent: carrierColor[carrier],
        bg: carrierBgColor[carrier],
      };
    }

    const agePlans = [
      {
        carrier: "docomo", carrierLabel: "docomo", plan: "U15はじめてスマホプラン",
        ageMin: 0, ageMax: 15, ageLabel: "15歳以下",
        strages: [{ giga: "5GB", price: 1815 }, { giga: "10GB", price: 2695 }],
        discounts: { family: [], card: [{ tier: 1, value: 187 }], net: null },
        deadline: "満19歳まで",
        memo: "最大12ヶ月間dポイント（500 / 1000）還元<br>家族間通話無料<br>みんなドコモ割カウント対象"
      },
      {
        carrier: "docomo", carrierLabel: "docomo", plan: "ドコモU22割",
        ageMin: 0, ageMax: 22, ageLabel: "22歳以下",
        strages: [{ giga: "~28GB", price: 2970 }, { giga: "28~30GB", price: 2970 }, { giga: "30GB~", price: 7898 }],
        discounts: { family: [{ tier: 1, value: 550 }, { tier: 2, value: 1210 }], card: [{ tier: 1, value: 220 }, { tier: 2, value: 550 }], net: 1210 },
        deadline: "7ヶ月間",
        memo: "7ヶ月以降通常ドコモMAX<br>家族間通話無料<br>みんなドコモ割カウント対象"
      },
      {
        carrier: "docomo", carrierLabel: "docomo", plan: "ドコモU29割",
        ageMin: 23, ageMax: 29, ageLabel: "23~29歳",
        strages: [{ giga: "~28GB", price: 2970 }, { giga: "28~30GB", price: 2970 }, { giga: "30GB~", price: 7898 }],
        discounts: { family: [{ tier: 1, value: 550 }, { tier: 2, value: 1210 }], card: [{ tier: 1, value: 220 }, { tier: 2, value: 550 }], net: 1210 },
        deadline: "3ヶ月間",
        memo: "3ヶ月以降通常ドコモMAX<br>家族間通話無料<br>みんなドコモ割カウント対象"
      },
      {
        carrier: "au", carrierLabel: "au", plan: "U12バリュープラン",
        ageMin: 5, ageMax: 12, ageLabel: "5~12歳",
        strages: [{ giga: "無制限", price: 1870 }],
        discounts: { family: [{ tier: 1, value: 1100 }], card: [{ tier: 1, value: 220 }], net: null },
        deadline: "無し",
        memo: "送受信最大30kbpsの低速通信<br>同一の「家族割」に加入への国内通話・SMS無料<br>家族割プラスのカウント対象外"
      },
      {
        carrier: "au", carrierLabel: "au", plan: "U18バリュープラン",
        ageMin: 5, ageMax: 18, ageLabel: "5~18歳",
        strages: [{ giga: "~3GB", price: 2398 }, { giga: "3~20GB", price: 4048 }],
        discounts: { family: [{ tier: 1, value: 220 }, { tier: 2, value: 550 }], card: [{ tier: 1, value: 220 }], net: 550 },
        deadline: "22歳まで",
        memo: "23歳以降は利用が3GB以下でも ￥4,048<br>家族割プラスのカウント対象"
      },
      {
        carrier: "au", carrierLabel: "au", plan: "シニアバリュープラン",
        ageMin: 60, ageMax: 999, ageLabel: "60歳以上",
        strages: [{ giga: "5GB", price: 4048 }],
        discounts: { family: [], card: [{ tier: 2, value: 220 }], net: 1100 },
        deadline: "無し",
        memo: "5分通話無料, 24時間通話無料が￥1,100<br>au PAYカードお支払い割はauじぶん銀行お支払いで代替でも割引適用"
      },
      {
        carrier: "softbank", carrierLabel: "softbank", plan: "スマホデビュープラン",
        ageMin: 5, ageMax: 18, ageLabel: "5~18歳（ガラケーからの乗り換え / 機種変更を除く）",
        strages: [{ giga: "4GB", price: 1078 }, { giga: "20GB", price: 2728 }],
        discounts: { family: [], card: [], net: null },
        deadline: "13ヶ月間",
        memo: "新規またはガラケーからの乗り換え / 機種変更のみ受付<br>14ヶ月目以降は4GBで￥2,596, 20GBで￥4,246<br>新みんな家族割カウント対象"
      },
      {
        carrier: "Rakuten", carrierLabel: "Rakuten", plan: "最強こども割",
        ageMin: 0, ageMax: 12, ageLabel: "12歳以下",
        strages: [{ giga: "~3GB", price: 528 }, { giga: "3~20GB", price: 1958 }, { giga: "20GB~", price: 3058 }],
        discounts: { family: [], card: [], net: null },
        deadline: "13歳誕生月前月まで",
        memo: "最強U-NEXTも割引対象で￥4,158"
      },
      {
        carrier: "Rakuten", carrierLabel: "Rakuten", plan: "最強青春割",
        ageMin: 13, ageMax: 22, ageLabel: "13~22歳",
        strages: [{ giga: "~3GB", price: 858 }, { giga: "3~20GB", price: 1958 }, { giga: "20GB~", price: 3058 }],
        discounts: { family: [], card: [], net: null },
        deadline: "23歳誕生月前月まで",
        memo: "最強U-NEXTも割引対象で￥4,158"
      },
      {
        carrier: "Rakuten", carrierLabel: "Rakuten", plan: "最強シニアプログラム",
        ageMin: 65, ageMax: 999, ageLabel: "65歳以上",
        strages: [{ giga: "~3GB", price: 858 }, { giga: "3~20GB", price: 1958 }, { giga: "20GB~", price: 3058 }],
        discounts: { family: [], card: [], net: null },
        deadline: "無し",
        memo: ""
      }
    ];

    // 📞 通話特典（セクション2）：年齢一致時に該当プランカード一覧の下へ注記表示
    const callBenefits = [
      {
        carrierLabel: "UQ mobile", plan: "トクトクプランⅡ",
        ageMin: 60, ageMax: 999,
        content: "24時間通話放題1,980円が880円に", price: 880, other: ""
      },
      {
        carrierLabel: "softbank", plan: "スマホデビュープラン",
        ageMin: 60, ageMax: 999,
        content: "24時間通話放題1,980円が880円に", price: 880, other: "ガラケーからの乗り換えまたは機種変更のみ対象"
      },
      {
        carrierLabel: "Rakuten", plan: "最強プラン",
        ageMin: 65, ageMax: 999,
        content: "15分通話無料つき<br>条件達成で実質割引", price: 880, other: ""
      }
    ];

    // キャリアごとの割引名称（同じ仕組みの割引でもキャリアによって呼び方が異なる）
    const discountLabels = {
      docomo: {
        family: 'みんなドコモ割',
        familyTier: tier => tier === 1 ? '（2回線）' : '（3回線以上）',
        card: 'dカードお支払い割',
        cardTier: tier => tier === 1 ? '（REGULAR）' : '（GOLD U / GOLD / PLUTINUM）',
        net: 'ドコモ光 / home 5G割',
      },
      au: {
        family: '家族割プラス',
        familyTier: tier => tier === 1 ? '（2回線）' : '（3回線以上）',
        card: 'au PAY カードお支払い割',
        cardTier: () => '',
        net: 'auスマートバリュー',
      },
      UQ: {
        family: '家族割プラス',
        familyTier: tier => tier === 1 ? '（2回線）' : '（3回線以上）',
        card: 'au PAY カードお支払い割',
        cardTier: () => '',
        net: 'auスマートバリュー',
      },
      softbank: {
        family: 'みんな家族割',
        familyTier: tier => tier === 1 ? '（2回線）' : '（3回線以上）',
        card: 'PayPayカード割',
        cardTier: () => '',
        net: 'おうち割 光セット',
      },
      Rakuten: {
        family: '家族割引',
        familyTier: tier => tier === 1 ? '（2回線）' : '（3回線以上）',
        card: '楽天カード支払い割',
        cardTier: () => '',
        net: '楽天ひかり割',
      },
    };

    function renderPlanCard(p, idx) {
      const color = buildPlanColor(p.carrier);
      const strageHtml = p.strages
        .map((s, i) => `
          <label class="checkbox-label">
            <input type="radio" name="strage-${idx}" value="${i}" onchange="updatePlanTotal(${idx})">
            ${s.giga}　￥${s.price.toLocaleString()}
          </label>`)
        .join('');

      const labels = discountLabels[p.carrier];
      let discountOptionsHtml = '';

      if (p.discounts.family.length === 2) {
        discountOptionsHtml += p.discounts.family.map((t, i) => `
          <label class="checkbox-label">
            <input type="checkbox" class="discount-cb-${idx} family-tier-${idx}" data-value="${t.value}" disabled
              onchange="handleTierExclusive(this, 'family-tier-${idx}'); updatePlanTotal(${idx})">
            ${labels.family}${labels.familyTier(i === 0 ? 1 : 2)}　▲￥${t.value.toLocaleString()}
          </label>`).join('');
      } else if (p.discounts.family.length === 1) {
        const t = p.discounts.family[0];
        discountOptionsHtml += `
          <label class="checkbox-label">
            <input type="checkbox" class="discount-cb-${idx}" data-value="${t.value}" disabled onchange="updatePlanTotal(${idx})">
            ${labels.family}${labels.familyTier(t.tier)}　▲￥${t.value.toLocaleString()}
          </label>`;
      }

      if (p.discounts.card.length === 2) {
        discountOptionsHtml += p.discounts.card.map((t, i) => `
          <label class="checkbox-label">
            <input type="checkbox" class="discount-cb-${idx} card-tier-${idx}" data-value="${t.value}" disabled
              onchange="handleTierExclusive(this, 'card-tier-${idx}'); updatePlanTotal(${idx})">
            ${labels.card}${labels.cardTier(i === 0 ? 1 : 2)}　▲￥${t.value.toLocaleString()}
          </label>`).join('');
      } else if (p.discounts.card.length === 1) {
        const t = p.discounts.card[0];
        discountOptionsHtml += `
          <label class="checkbox-label">
            <input type="checkbox" class="discount-cb-${idx}" data-value="${t.value}" disabled onchange="updatePlanTotal(${idx})">
            ${labels.card}${labels.cardTier(t.tier)}　▲￥${t.value.toLocaleString()}
          </label>`;
      }

      if (p.discounts.net !== null) {
        discountOptionsHtml += `
          <label class="checkbox-label">
            <input type="checkbox" class="discount-cb-${idx}" data-value="${p.discounts.net}" disabled onchange="updatePlanTotal(${idx})">
            ${labels.net}　▲￥${p.discounts.net.toLocaleString()}
          </label>`;
      }

      let discountHtml;
      if (discountOptionsHtml) {
        discountHtml = `
          <label class="checkbox-label discount-master-label">
            <input type="checkbox" id="discount-master-${idx}" onchange="toggleDiscountMaster(${idx})">
            割引を利用する
          </label>
          <div class="checkbox-group discount-options" id="discount-options-${idx}" style="margin-bottom:0;">
            ${discountOptionsHtml}
          </div>`;
      } else {
        discountHtml = `<div class="no-discount-note">対象の割引はありません</div>`;
      }

      return `
        <div class="card plan-result-card" style="border-left-color:${color.accent}; background:${color.bg};">
          <button type="button" class="plan-card-header" aria-expanded="false" aria-controls="plan-card-body-${idx}" onclick="togglePlanCard(${idx})">
            <span class="result-card-carrier" style="background:#fff; border:1.5px solid ${color.accent}; color:${color.accent};">${p.carrierLabel}</span>
            <span class="result-card-name">${p.plan}<span class="result-card-name-age">（${p.ageLabel}）</span></span>
            <span class="plan-card-chevron">▼</span>
          </button>

          <div class="plan-card-body" id="plan-card-body-${idx}">
            <div class="result-card-age">対象年齢：${p.ageLabel}</div>

            <div class="sub-container">
              <h3 class="plan-sub-title">月額</h3>
              <label>容量を選択:</label>
              <div class="checkbox-group" style="margin-bottom:0;">
                ${strageHtml}
              </div>
              <div class="subtotal-wrapper">
                <div class="subtotal-box bg-plan">月額: <span id="monthly-output-${idx}">￥0</span></div>
              </div>
            </div>

            <div class="sub-container">
              <h3 class="plan-sub-title">割引</h3>
              ${discountHtml}
              <div class="subtotal-wrapper">
                <div class="subtotal-box bg-discount">割引合計: <span id="discount-output-${idx}">▲￥0</span></div>
              </div>
            </div>

            <div class="plan-card-total-memo" id="plan-total-memo-${idx}">
              <div class="subtotal-wrapper" style="margin-top:14px;">
                <div class="subtotal-box" style="background:#fff; border:2px solid ${color.accent}; font-size:1rem;">
                  合計月額: <span id="total-output-${idx}" style="color:${color.accent};">￥0</span>
                </div>
              </div>

              <div class="program-notice-box">
                割引期限：${p.deadline}${p.memo ? `<br>${p.memo}` : ''}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // 年齢を入力する前から表示しておく「年齢プラン一覧」：全プランを読み取り専用で一覧表示する
    function getDiscountLines(p) {
      const labels = discountLabels[p.carrier];
      const lines = [];
      if (p.discounts.family.length === 2) {
        p.discounts.family.forEach((t, i) => {
          lines.push(`${labels.family}${labels.familyTier(i === 0 ? 1 : 2)}　▲￥${t.value.toLocaleString()}`);
        });
      } else if (p.discounts.family.length === 1) {
        const t = p.discounts.family[0];
        lines.push(`${labels.family}${labels.familyTier(t.tier)}　▲￥${t.value.toLocaleString()}`);
      }
      if (p.discounts.card.length === 2) {
        p.discounts.card.forEach((t, i) => {
          lines.push(`${labels.card}${labels.cardTier(i === 0 ? 1 : 2)}　▲￥${t.value.toLocaleString()}`);
        });
      } else if (p.discounts.card.length === 1) {
        const t = p.discounts.card[0];
        lines.push(`${labels.card}${labels.cardTier(t.tier)}　▲￥${t.value.toLocaleString()}`);
      }
      if (p.discounts.net !== null) {
        lines.push(`${labels.net}　▲￥${p.discounts.net.toLocaleString()}`);
      }
      return lines;
    }

    function renderPlanOverviewCard(p, idx) {
      const color = buildPlanColor(p.carrier);
      const strageHtml = p.strages.map(s => `${s.giga}　￥${s.price.toLocaleString()}`).join('<br>');
      const discountLines = getDiscountLines(p);
      const discountHtml = discountLines.length ? discountLines.join('<br>') : '対象の割引はありません';

      return `
        <div class="card plan-result-card" style="border-left-color:${color.accent}; background:${color.bg};">
          <button type="button" class="plan-card-header" aria-expanded="false" aria-controls="overview-plan-card-body-${idx}" onclick="toggleOverviewPlanCard(${idx})">
            <span class="result-card-carrier" style="background:#fff; border:1.5px solid ${color.accent}; color:${color.accent};">${p.carrierLabel}</span>
            <span class="result-card-name">${p.plan}<span class="result-card-name-age">（${p.ageLabel}）</span></span>
            <span class="plan-card-chevron">▼</span>
          </button>

          <div class="plan-card-body" id="overview-plan-card-body-${idx}">
            <div class="result-card-age">対象年齢：${p.ageLabel}</div>

            <div class="sub-container">
              <h3 class="plan-sub-title">月額</h3>
              <div>${strageHtml}</div>
            </div>

            <div class="sub-container">
              <h3 class="plan-sub-title">割引</h3>
              <div>${discountHtml}</div>
            </div>

            <div class="program-notice-box">
              割引期限：${p.deadline}${p.memo ? `<br>${p.memo}` : ''}
            </div>
          </div>
        </div>
      `;
    }

    function toggleOverviewPlanCard(idx) {
      const body = document.getElementById(`overview-plan-card-body-${idx}`);
      const header = body.previousElementSibling;
      const isOpen = body.style.display === 'block';
      body.style.display = isOpen ? 'none' : 'block';
      header.setAttribute('aria-expanded', String(!isOpen));
    }

    function renderPlanOverviewList() {
      document.getElementById('age-plan-overview-list').innerHTML =
        agePlans.map((p, idx) => renderPlanOverviewCard(p, idx)).join('');
    }

    // 「年齢プラン一覧」全体の開閉ボタン
    function toggleAgePlanOverviewList() {
      const list = document.getElementById('age-plan-overview-list');
      const btn = document.getElementById('age-overview-toggle-btn');
      const isOpen = list.style.display !== 'none';
      list.style.display = isOpen ? 'none' : '';
      btn.textContent = isOpen ? '開く ▼' : '閉じる ▲';
      btn.setAttribute('aria-expanded', String(!isOpen));
    }

    function togglePlanCard(idx) {
      const header = document.querySelector(`#plan-card-body-${idx}`).previousElementSibling;
      const body = document.getElementById(`plan-card-body-${idx}`);
      const isOpen = body.style.display === 'block';
      body.style.display = isOpen ? 'none' : 'block';
      header.setAttribute('aria-expanded', String(!isOpen));
    }

    // 割引の「マスターチェック」がON/OFFされたら、配下の各割引チェックボックスの有効/無効を切り替える
    function toggleDiscountMaster(idx) {
      const master = document.getElementById(`discount-master-${idx}`);
      const container = document.getElementById(`discount-options-${idx}`);
      if (!container) return;
      container.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        cb.disabled = !master.checked;
        if (!master.checked) cb.checked = false;
      });
      updatePlanTotal(idx);
    }

    // 同一割引（家族割・カード割）内のティア①②は同時に選べないようにする
    function handleTierExclusive(checkbox, groupClass) {
      if (checkbox.checked) {
        document.querySelectorAll(`.${groupClass}`).forEach(other => {
          if (other !== checkbox) other.checked = false;
        });
      }
    }

    function updatePlanTotal(idx) {
      const p = agePlans[idx];
      const strageChecked = document.querySelector(`input[name="strage-${idx}"]:checked`);
      const strageIdx = strageChecked ? strageChecked.value : '';
      const monthlyPrice = strageIdx !== '' ? p.strages[strageIdx].price : 0;

      let discountTotal = 0;
      document.querySelectorAll(`.discount-cb-${idx}:checked`).forEach(cb => {
        discountTotal += parseInt(cb.dataset.value, 10);
      });

      document.getElementById(`monthly-output-${idx}`).textContent = `￥${monthlyPrice.toLocaleString()}`;
      document.getElementById(`discount-output-${idx}`).textContent = `▲￥${discountTotal.toLocaleString()}`;

      const total = strageIdx !== '' ? Math.max(0, monthlyPrice - discountTotal) : 0;
      document.getElementById(`total-output-${idx}`).textContent = `￥${total.toLocaleString()}`;

      document.getElementById(`plan-total-memo-${idx}`).style.display = strageIdx !== '' ? 'block' : 'none';
    }

    // =======================================================================================================================
    // 🎂 生年月日プルダウン：年（西暦＋元号）・月・日を選択させ、そこから満年齢を算出する
    // =======================================================================================================================
    const eraTable = [
      { key: 'showa', name: '昭和', start: new Date(1926, 11, 25), end: new Date(1989, 0, 7) },
      { key: 'heisei', name: '平成', start: new Date(1989, 0, 8), end: new Date(2019, 3, 30) },
      { key: 'reiwa', name: '令和', start: new Date(2019, 4, 1), end: null },
    ];

    // 指定した西暦年に重なる元号区間を返す（1989年・2019年のように年の途中で改元する年は2区間になる）
    function getEraSegmentsForYear(y) {
      const yearStart = new Date(y, 0, 1);
      const yearEnd = new Date(y, 11, 31);
      const segments = [];
      eraTable.forEach(era => {
        const segStart = era.start > yearStart ? era.start : yearStart;
        const effectiveEnd = era.end === null ? yearEnd : (era.end < yearEnd ? era.end : yearEnd);
        if (segStart <= effectiveEnd) {
          segments.push({
            key: era.key,
            name: era.name,
            eraYear: y - era.start.getFullYear() + 1,
            minMonth: segStart.getMonth() + 1,
            minDay: segStart.getDate(),
            maxMonth: effectiveEnd.getMonth() + 1,
            maxDay: effectiveEnd.getDate(),
          });
        }
      });
      return segments;
    }

    function populateBirthYearOptions() {
      const yearSelect = document.getElementById('birth-year');
      const currentYear = new Date().getFullYear();
      let options = '<option value="">年</option>';
      for (let y = currentYear; y >= currentYear - 100; y--) {
        getEraSegmentsForYear(y).forEach(seg => {
          const eraLabel = seg.eraYear === 1 ? `${seg.name}元年` : `${seg.name}${seg.eraYear}年`;
          options += `<option value="${y}-${seg.key}">${y}年（${eraLabel}）</option>`;
        });
      }
      yearSelect.innerHTML = options;
    }

    function populateBirthMonthOptions() {
      const yearSelect = document.getElementById('birth-year');
      const monthSelect = document.getElementById('birth-month');
      const prevValue = monthSelect.value;

      let minMonth = 1, maxMonth = 12;
      if (yearSelect.value) {
        const [yStr, key] = yearSelect.value.split('-');
        const seg = getEraSegmentsForYear(parseInt(yStr, 10)).find(s => s.key === key);
        if (seg) { minMonth = seg.minMonth; maxMonth = seg.maxMonth; }
      }

      let options = '<option value="">月</option>';
      for (let m = minMonth; m <= maxMonth; m++) {
        options += `<option value="${m}">${m}月</option>`;
      }
      monthSelect.innerHTML = options;

      if (prevValue && parseInt(prevValue, 10) >= minMonth && parseInt(prevValue, 10) <= maxMonth) {
        monthSelect.value = prevValue;
      }
    }

    function populateBirthDayOptions() {
      const yearSelect = document.getElementById('birth-year');
      const monthSelect = document.getElementById('birth-month');
      const daySelect = document.getElementById('birth-day');
      const prevValue = daySelect.value;

      const month = monthSelect.value ? parseInt(monthSelect.value, 10) : null;
      let minDay = 1;
      let maxDay = 31;

      if (yearSelect.value && month) {
        const [yStr, key] = yearSelect.value.split('-');
        const y = parseInt(yStr, 10);
        maxDay = new Date(y, month, 0).getDate();
        const seg = getEraSegmentsForYear(y).find(s => s.key === key);
        if (seg) {
          if (month === seg.minMonth) minDay = Math.max(minDay, seg.minDay);
          if (month === seg.maxMonth) maxDay = Math.min(maxDay, seg.maxDay);
        }
      }

      let options = '<option value="">日</option>';
      for (let d = minDay; d <= maxDay; d++) {
        options += `<option value="${d}">${d}日</option>`;
      }
      daySelect.innerHTML = options;

      if (prevValue && parseInt(prevValue, 10) >= minDay && parseInt(prevValue, 10) <= maxDay) {
        daySelect.value = prevValue;
      }
    }

    function calcAge(year, month, day) {
      const today = new Date();
      const birth = new Date(year, month - 1, day);
      let age = today.getFullYear() - birth.getFullYear();
      const hasHadBirthdayThisYear =
        (today.getMonth() > birth.getMonth()) ||
        (today.getMonth() === birth.getMonth() && today.getDate() >= birth.getDate());
      if (!hasHadBirthdayThisYear) age--;
      return age;
    }

    // 指定した満年齢にマッチするプランが1つでも存在するか
    function hasAnyPlanMatch(age) {
      return age >= 0 && agePlans.some(p => age >= p.ageMin && age <= p.ageMax);
    }

    // 年だけから、月日に関わらずマッチするプランが存在し得ない「対象外年」かどうかを判定する
    // （誕生日が今年まだ来ていない/来ている の2パターンの年齢どちらもマッチしなければ対象外）
    function isYearEligible(yearRaw) {
      const y = parseInt(yearRaw, 10);
      const ageIfBirthdayPassed = new Date().getFullYear() - y;
      return hasAnyPlanMatch(ageIfBirthdayPassed) || hasAnyPlanMatch(ageIfBirthdayPassed - 1);
    }

    // 結果表示エリアを隠す（年齢が未確定・不正な場合に呼ぶ）
    function clearResults() {
      document.getElementById('age-results-section').style.display = 'none';
      document.getElementById('birth-age-display').style.display = 'none';
    }

    // 満年齢が確定した時点で呼ぶ：プラン一覧・通話特典を年齢に応じて描画する
    function applyAge(age) {
      const resultsSection = document.getElementById('age-results-section');
      const ageDisplay = document.getElementById('birth-age-display');
      const listEl = document.getElementById('age-plan-list');
      const noMatchEl = document.getElementById('age-no-match');
      const callCard = document.getElementById('age-call-benefit-card');
      const callList = document.getElementById('age-call-benefit-list');

      if (isNaN(age) || age < 0) {
        clearResults();
        return;
      }

      ageDisplay.textContent = `満${age}歳`;
      ageDisplay.style.display = 'block';

      resultsSection.style.display = 'block';

      const matches = agePlans
        .map((p, idx) => ({ p, idx }))
        .filter(({ p }) => age >= p.ageMin && age <= p.ageMax);

      if (matches.length === 0) {
        listEl.innerHTML = '';
        noMatchEl.style.display = 'block';
      } else {
        noMatchEl.style.display = 'none';
        listEl.innerHTML = matches.map(({ p, idx }) => renderPlanCard(p, idx)).join('');
        matches.forEach(({ idx }) => updatePlanTotal(idx));
      }

      const matchedBenefits = callBenefits.filter(b => age >= b.ageMin && age <= b.ageMax);
      if (matchedBenefits.length > 0) {
        callCard.style.display = 'block';
        callList.innerHTML = matchedBenefits.map(b => `
          <div class="program-notice-box">
            <strong>${b.carrierLabel} / ${b.plan}</strong><br>
            ${b.content}　→　月額￥${b.price.toLocaleString()}
            ${b.other ? `<br>${b.other}` : ''}
          </div>
        `).join('');
      } else {
        callCard.style.display = 'none';
        callList.innerHTML = '';
      }
    }

    // 生年月日/年齢入力後にEnterキーが押されたら「加入可能プラン一覧」の先頭へジャンプする
    function jumpToPlanResults(e) {
      if (e.key !== 'Enter') return;
      const resultsSection = document.getElementById('age-results-section');
      if (resultsSection.style.display === 'none') return;
      e.preventDefault();
      resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // 入力方法（生年月日/年齢直接入力）の切り替え
    function onAgeInputModeChange() {
      const mode = document.querySelector('input[name="age-input-mode"]:checked').value;
      const birthSection = document.getElementById('birth-input-section');
      const directSection = document.getElementById('direct-age-input-section');
      const oobMessage = document.getElementById('age-year-oob-message');

      if (mode === 'birth') {
        birthSection.style.display = 'block';
        directSection.style.display = 'none';
        document.getElementById('direct-age-input').value = '';
        onBirthChange();
      } else {
        birthSection.style.display = 'none';
        directSection.style.display = 'block';
        oobMessage.style.display = 'none';
        clearResults();
        document.getElementById('direct-age-input').focus();
      }
    }

    // 年齢を直接入力するモード
    function onDirectAgeChange() {
      const raw = document.getElementById('direct-age-input').value;
      if (raw === '') {
        clearResults();
        return;
      }
      applyAge(parseInt(raw, 10));
    }

    function onBirthChange() {
      populateBirthMonthOptions();
      populateBirthDayOptions();

      const yearVal = document.getElementById('birth-year').value;
      const monthSelect = document.getElementById('birth-month');
      const daySelect = document.getElementById('birth-day');
      const oobMessage = document.getElementById('age-year-oob-message');

      if (yearVal === '') {
        monthSelect.disabled = false;
        daySelect.disabled = false;
        oobMessage.style.display = 'none';
        clearResults();
        return;
      }

      const yearRaw = yearVal.split('-')[0];

      if (!isYearEligible(yearRaw)) {
        monthSelect.value = '';
        daySelect.value = '';
        monthSelect.disabled = true;
        daySelect.disabled = true;
        oobMessage.style.display = 'block';
        clearResults();
        return;
      }

      monthSelect.disabled = false;
      daySelect.disabled = false;
      oobMessage.style.display = 'none';

      const monthRaw = monthSelect.value;
      const dayRaw = daySelect.value;

      if (monthRaw === '' || dayRaw === '') {
        clearResults();
        return;
      }

      const age = calcAge(parseInt(yearRaw, 10), parseInt(monthRaw, 10), parseInt(dayRaw, 10));
      applyAge(age);
    }

    populateBirthYearOptions();
    populateBirthMonthOptions();
    populateBirthDayOptions();
    renderPlanOverviewList();

    // iframeの中から、親画面（ブラウザのタブ）のタイトルを強制的に書き換える
    if (window.parent !== window) {
      window.parent.document.title = "Veil";
    }
  </script>
