<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プランかんたん検索</title>
  <link rel="stylesheet" href="style.css">
  <style>
    html,
    body {
      /* 🚫 上下に引っ張ったときのブラウザ固有のバウンス（跳ね返り）を抑えつつ、
            iframeとして埋め込まれた際に、下端/上端まで来たらスクロールを
            親ページ（外側）へきちんと引き継げるよう "auto"（既定値）にする。
            ※ "contain" や "none" だと、親ページへのスクロールの伝播（チェイン）が
               ブロックされてしまい、スクロールバーを直接ドラッグしないと
               動かせなくなってしまう */
      overscroll-behavior-y: auto;
    }

    body {
      padding: 20px 16px 40px;
    }

    /* モード選択チェックボックス */
    .mode-toggle {
      padding: 10px 4px;
      font-size: 1.02rem;
      font-weight: 700;
    }

    /* 使用状況／条件指定 fieldset */
    fieldset.mode-fieldset {
      border: none;
      padding: 16px;
      margin: 0 0 16px 0;
    }

    fieldset.mode-fieldset:disabled {
      opacity: 0.45;
    }

    fieldset.mode-fieldset legend {
      padding: 0;
      font-size: 1.15rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 12px;
      border-bottom: 2px solid var(--primary-color);
      padding-bottom: 6px;
      width: 100%;
    }

    .usage-option {
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      background-color: #f8f9fa;
    }

    .usage-radio-label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .usage-radio-label input[type="radio"] {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      accent-color: var(--primary-color);
    }

    .usage-title {
      font-weight: 700;
      font-size: 1rem;
    }

    .usage-desc {
      margin: 6px 0 0 28px;
      font-size: 0.85rem;
      color: var(--text-sub);
    }

    .adv-field {
      margin-bottom: 18px;
    }

    .adv-field>label {
      display: block;
      margin-bottom: 8px;
    }

    .carrier-checkbox-group,
    .discount-checkbox-group {
      grid-template-columns: repeat(2, 1fr);
    }

    .range-input-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .range-input-row span {
      flex-shrink: 0;
      color: var(--text-sub);
    }

    .btn-search-run {
      width: 100%;
      padding: 12px;
      background-color: var(--primary-color);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    /* 並び替えボタン */
    .sort-btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .sort-btn {
      padding: 7px 12px;
      border: 1px solid var(--border-color);
      background: #fff;
      border-radius: 999px;
      font-size: 0.82rem;
      cursor: pointer;
      color: var(--text-main);
    }

    .sort-btn.active {
      background: var(--primary-color);
      color: #fff;
      border-color: var(--primary-color);
    }

    /* 結果カード */
    .result-card-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .result-card {
      border: 1px solid var(--border-color);
      border-left-width: 6px;
      border-left-style: solid;
      border-radius: 10px;
      padding: 14px 16px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .result-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.09);
    }

    .result-card-carrier {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 999px;
      margin-bottom: 6px;
      background: #fff;
      border: 1.5px solid;
    }

    .result-card-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: #111;
    }

    .result-card-giga {
      font-size: 0.85rem;
      color: var(--text-sub);
      margin-top: 2px;
    }

    .result-card-price {
      margin-top: 8px;
      font-size: 1.3rem;
      font-weight: 800;
      color: #dc3545;
    }

    .result-card-price .unit {
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--text-sub);
      margin-left: 2px;
    }

    .result-card-desc {
      margin-top: 8px;
      font-size: 0.82rem;
      color: var(--text-sub);
      line-height: 1.5;
    }

    .result-card-memo {
      margin-top: 8px;
      font-size: 0.82rem;
      color: var(--text-sub);
      padding-top: 8px;
      border-top: 1px dashed var(--border-color);
    }

    .result-header-title {
      justify-content: flex-start;
    }

    .result-empty {
      text-align: center;
      color: #999;
      padding: 30px 0;
    }

    @media (max-width: 380px) {

      .carrier-checkbox-group,
      .discount-checkbox-group {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1 class="veil-outer-title">プラン検索</h1>

    <!-- ===================== 検索 ===================== -->
    <section id="search-area">

      <div class="card">
        <h2>検索方法を選択</h2>
        <label class="checkbox-label mode-toggle">
          <input type="checkbox" id="mode-usage" onchange="onModeToggle('usage')">
          <span>使用状況からかんたん検索</span>
        </label>
        <label class="checkbox-label mode-toggle">
          <input type="checkbox" id="mode-advanced" onchange="onModeToggle('advanced')">
          <span>条件を指定して検索</span>
        </label>
      </div>

      <fieldset id="fieldset-usage" class="card mode-fieldset" disabled>
        <legend>かんたん検索</legend>

        <div class="usage-option">
          <label class="usage-radio-label">
            <input type="radio" name="usage-preset" value="3" onchange="runUsageSearch('3')">
            <span class="usage-title">あまり使わない</span>
          </label>
          <p class="usage-desc">LINE・検索がメイン、SNS（写真・画像）を少し見る、家ではWi-Fiを使用等</p>
        </div>

        <div class="usage-option">
          <label class="usage-radio-label">
            <input type="radio" name="usage-preset" value="35" onchange="runUsageSearch('35')">
            <span class="usage-title">普段使い</span>
          </label>
          <p class="usage-desc">例：動画をよく見る、常に通信を必要とするゲームをする等（目安：1時間の動画 / 1GB）</p>
        </div>

        <div class="usage-option">
          <label class="usage-radio-label">
            <input type="radio" name="usage-preset" value="35plus" onchange="runUsageSearch('35plus')">
            <span class="usage-title">よく使う</span>
          </label>
          <p class="usage-desc">自宅や出先でWi-Fiがなく、動画やゲームをたくさんする等</p>
        </div>
      </fieldset>

      <fieldset id="fieldset-advanced" class="card mode-fieldset" disabled>
        <legend>条件を指定して検索</legend>

        <div class="adv-field">
          <label>キャリア（複数選択可）</label>
          <div class="checkbox-group carrier-checkbox-group">
            <label class="checkbox-label"><input type="checkbox" class="carrier-cb" value="docomo"><span>ドコモ</span></label>
            <label class="checkbox-label"><input type="checkbox" class="carrier-cb" value="au"><span>au</span></label>
            <label class="checkbox-label"><input type="checkbox" class="carrier-cb" value="UQ"><span>UQ mobile</span></label>
            <label class="checkbox-label"><input type="checkbox" class="carrier-cb" value="softbank"><span>softbank</span></label>
            <label class="checkbox-label"><input type="checkbox" class="carrier-cb" value="Ymobile"><span>Y! mobile</span></label>
            <label class="checkbox-label"><input type="checkbox" class="carrier-cb" value="Rakuten"><span>Rakuten</span></label>
          </div>
        </div>

        <div class="adv-field">
          <label>容量（GB）</label>
          <div class="range-input-row">
            <input type="number" id="adv-gb-min" min="0" placeholder="下限">
            <span>〜</span>
            <input type="number" id="adv-gb-max" min="0" placeholder="上限">
          </div>
        </div>

        <div class="adv-field">
          <label>月額（円）</label>
          <div class="range-input-row">
            <input type="number" id="adv-price-min" min="0" placeholder="下限">
            <span>〜</span>
            <input type="number" id="adv-price-max" min="0" placeholder="上限">
          </div>
        </div>

        <div class="adv-field">
          <label>割引（チェックした条件を全て満たすプランに絞り込み）</label>
          <div class="checkbox-group discount-checkbox-group">
            <label class="checkbox-label"><input type="checkbox" class="discount-cb" value="family"><span>家族割がある</span></label>
            <label class="checkbox-label"><input type="checkbox" class="discount-cb" value="net"><span>ネットの割引がある</span></label>
            <label class="checkbox-label"><input type="checkbox" class="discount-cb" value="card"><span>支払いカードの割引がある</span></label>
            <label class="checkbox-label"><input type="checkbox" class="discount-cb" value="ele"><span>でんきの割引がある</span></label>
          </div>
        </div>

        <button type="button" class="btn-search-run" onclick="runAdvancedSearch()">この条件で検索する</button>
      </fieldset>
    </section>

    <!-- ===================== 検索結果 ===================== -->
    <section id="result-area">
      <div class="card">
        <h2 class="result-header-title">検索結果：　<span id="result-count">0</span>件</h2>
        <div class="sort-btn-row">
          <button type="button" class="sort-btn active" data-sort="price-asc" onclick="changeSort('price-asc')">料金の安い順</button>
          <button type="button" class="sort-btn" data-sort="price-desc" onclick="changeSort('price-desc')">料金の高い順</button>
          <button type="button" class="sort-btn" data-sort="gb-asc" onclick="changeSort('gb-asc')">容量の少ない順</button>
          <button type="button" class="sort-btn" data-sort="gb-desc" onclick="changeSort('gb-desc')">容量の多い順</button>
        </div>
        <div id="result-list" class="result-card-list"></div>
      </div>
    </section>

  </div>

  <script>
    // 📱 プランのマスターデータ（carrierdata.xlsx より確定値をハードコード）
    // discounts: family=家族割, net=ネット割, card=カード割, ele=でんき割 （true=〇 / false=×）
    const planData = {
      docomo: [
        { name: "ドコモMAX", discounts: { family: true, net: true, card: true, ele: true },
          desc: "Lemino, dアニメストア, DAZN, NBA・docomoのうちいずれか2つまで見放題（毎月切り替え可能）。<br>使用量に応じて料金が変動。",
          strages: [{ giga: "~1GB", price: 5698 }, { giga: "1~3GB", price: 6798 }, { giga: "3GB~", price: 8004 }] },
        { name: "ポイ活MAX", discounts: { family: true, net: true, card: true, ele: true },
          desc: "dポイント最大5,000ptで実質値引き。<br>ドコモMAX同様4種類のうち2つの動画配信サイトが見放題。",
          strages: [{ giga: "無制限", price: 11748 }] },
        { name: "ポイ活20", discounts: { family: true, net: true, card: true, ele: true },
          desc: "dポイント最大2,500ptで実質値引き。ポイ活を始めてみたい人向け。<br>使用量20GBを境に料金が変動。",
          strages: [{ giga: "~20GB", price: 7898 }, { giga: "20GB~", price: 9750 }] },
        { name: "ドコモmini", discounts: { family: false, net: true, card: true, ele: true },
          desc: "2種類の小容量の定額プラン。<br>キャリアメールは別途契約が必要なことに注意。",
          strages: [{ giga: "4GB", price: 2750 }, { giga: "10GB", price: 3850 }] },
        { name: "ahamo", discounts: { family: false, net: false, card: false, ele: false },
          desc: "割引無しの高コスパ最強プラン。<br>5分間かけ放題付きかつ+80GBのオプションも選べてあらゆる人が使いやすいプラン。",
          strages: [{ giga: "30GB", price: 2970 }, { giga: "110GB", price: 4950 }] },
      ],
      au: [
        { name: "バリューリンクプラン", discounts: { family: true, net: true, card: true, ele: false },
          desc: "無制限プランの基本サービスにPontaパスと地震サポートが加わったプラン。<br>使用量に応じて料金が変動。",
          strages: [{ giga: "~1GB", price: 6358 }, { giga: "1GB~", price: 8008 }] },
        { name: "バリューリンク マネ活2", discounts: { family: false, net: true, card: false, ele: false },
          desc: "auスマートバリュー、au PAYとauじぶん銀行利用で最大￥5,800分の実質値引き。<br>Pontaパスと地震サポートも付帯。",
          strages: [{ giga: "無制限", price: 9328 }] },
        { name: "使い放題MAX+", discounts: { family: true, net: true, card: true, ele: false },
          desc: "シンプルな無制限プラン。<br>1GBを境に料金が変動。",
          strages: [{ giga: "~1GB", price: 6138 }, { giga: "1GB~", price: 7788 }] },
        { name: "使い放題MAX+ マネ活2", discounts: { family: false, net: true, card: false, ele: false },
          desc: "使い放題MAX+にマネ活が加わったプラン。<br>auスマートバリュー、au PAYとauじぶん銀行利用で最大￥5,800分の実質値引き。",
          strages: [{ giga: "無制限", price: 9108 }] },
        { name: "スマホミニプラン+", discounts: { family: true, net: true, card: true, ele: false },
          desc: "最大5GBの小容量プラン。<br>それぞれ1GBと3GBで料金が変動。",
          strages: [{ giga: "~1GB", price: 4928 }, { giga: "1~3GB", price: 6578 }, { giga: "3~5GB", price: 8228 }] },
      ],
      UQ: [
        { name: "コミコミプランバリュー", discounts: { family: false, net: false, card: false, ele: false },
          desc: "35GBの定額プランで10分かけ放題付き。<br>Pontaパスとau Starlink Directが追加料金無しで利用可能。",
          strages: [{ giga: "35GB", price: 3828 }] },
        { name: "トクトクプラン2", discounts: { family: true, net: true, card: true, ele: true },
          desc: "5GBを境に料金が変動。<br>金額は異なるが自宅セット割か家族セット割の割引を選択可能で、より広い範囲で割引適用が可能。",
          strages: [{ giga: "~5GB", price: 2948 }, { giga: "5~30GB", price: 4048 }] },
      ],
      softbank: [
        { name: "ペイトク2", discounts: { family: true, net: true, card: true, ele: false },
          desc: "PayPayカード ゴールド所持でさらにお得。<br>還元率10%に増加で月上限￥4,000相当。",
          strages: [{ giga: "無制限", price: 10538 }] },
        { name: "テイガク無制限", discounts: { family: true, net: true, card: true, ele: false },
          desc: "シンプルな無制限プラン。",
          strages: [{ giga: "無制限", price: 8008 }] },
        { name: "ミニフィット2", discounts: { family: true, net: true, card: true, ele: false },
          desc: "2GBを境に月額料金が変動する5GBまでの小容量プラン。<br>新みんな家族割の割引額が小さいので注意。",
          strages: [{ giga: "~2GB", price: 5258 }, { giga: "2~5GB", price: 6358 }] },
      ],
      Ymobile: [
        { name: "シンプル3 S", discounts: { family: true, net: true, card: true, ele: false },
          desc: "小容量プランで各種割引の重複が可能で、PayPayカードはゴールドならさらに割引。<br>でんきセットは対象外で家族割引は2回線目以降から適用。",
          strages: [{ giga: "5GB", price: 3278 }] },
        { name: "シンプル3 M", discounts: { family: true, net: true, card: true, ele: true },
          desc: "中容量プランで各種割引の重複が可能で、PayPayカードはゴールドならさらに割引。<br>家族割引は2回線目以降から適用なので注意。",
          strages: [{ giga: "30GB", price: 4378 }] },
        { name: "シンプル3 L", discounts: { family: true, net: true, card: true, ele: true },
          desc: "10分国内かけ放題がついた中容量プランで各種割引重複可能。<br>家族割引は2回線目以降から適用なので注意。",
          strages: [{ giga: "35GB", price: 5478 }] },
      ],
      Rakuten: [
        { name: "最強プラン", discounts: { family: true, net: false, card: false, ele: false },
          desc: "1種類のみの分かりやすいプランで、~3GB、~20GB、無制限のいずれでもキャリア間で最安。<br>楽天市場のポイント還元率が+4倍上がる。",
          strages: [{ giga: "~3GB", price: 1078 }, { giga: "3~20GB", price: 2178 }, { giga: "20GB~", price: 3278 }] },
      ],
    };

    const carrierLabels = { docomo: "ドコモ", au: "au", UQ: "UQ mobile", softbank: "softbank", Ymobile: "Y! mobile", Rakuten: "Rakuten" };

    // キャリアごとの基準色相（色相環上の角度）。同キャリア内のプランはこの色相を保ったまま明度を変えて塗り分ける
    const carrierHue = { docomo: 350, au: 28, UQ: 200, softbank: 46, Ymobile: 322, Rakuten: 265 };

    function buildPlanColor(carrier) {
      return {
      accent: carrierColor[carrier],
      bg: carrierBgColor[carrier],
      };
    }

    // キャリアごとの固定カラー（キャリアバッジの枠線・文字色に使用）
    const carrierColor = {
      docomo: "#ff0000",   // 赤
      au: "#f57c00",       // オレンジ
      UQ: "#7b1fa2",       // 紫
      softbank: "#9e9e9e", // 薄いグレー
      Ymobile: "#ff3d3f",  // オレンジ寄りの赤
      Rakuten: "#ff00a7",  // ピンク
    };
    const carrierBgColor = {
      docomo: "#fff2f1",
      au: "#fff3e6",
      UQ: "#f3e8fb",
      softbank: "#f5f5f5",
      Ymobile: "#fff6ef",
      Rakuten: "#ffe9ef",
    };

    // carrier(色相) × planIndex(明度) の組み合わせでプランごとに一意な配色を作る

    const LARGE_GB_SENTINEL = 999999; // 無制限 / open-high側の代表最大値

    // giga文字列 → { min, max } のGB範囲にパースする
    function parseGiga(giga) {
      if (giga === "無制限") return { min: 0, max: LARGE_GB_SENTINEL };
      let m = giga.match(/^(\d+)~(\d+)GB$/);   // "N~MGB"
      if (m) return { min: Number(m[1]), max: Number(m[2]) };
      m = giga.match(/^(\d+)GB~$/);            // "NGB~"
      if (m) return { min: Number(m[1]), max: LARGE_GB_SENTINEL };
      m = giga.match(/^~(\d+)GB$/);            // "~NGB"
      if (m) return { min: 0, max: Number(m[1]) };
      m = giga.match(/^(\d+)GB$/);             // "NGB"
      if (m) return { min: Number(m[1]), max: Number(m[1]) };
      return { min: 0, max: 0 };
    }

    // 割引フラグだけから機械的にmemoを生成する
    function buildMemo(discounts) {
      const labels = [];
      if (discounts.family) labels.push("家族割");
      if (discounts.net) labels.push("ネット割");
      if (discounts.card) labels.push("カード割");
      if (discounts.ele) labels.push("でんき割");
      return labels.length > 0 ? `${labels.join("・")} 対象` : "対象の割引なし";
    }

    // 全プラン×全tierをフラットな検索結果エントリ配列に展開する
    function buildFlatEntries() {
      const entries = [];
      Object.keys(planData).forEach(carrier => {
        planData[carrier].forEach((plan, planIndex) => {
          const color = buildPlanColor(carrier, planIndex);
          plan.strages.forEach(tier => {
            const range = parseGiga(tier.giga);
            entries.push({
              carrier,
              carrierLabel: carrierLabels[carrier],
              carrierColor: carrierColor[carrier],
              planName: plan.name,
              desc: plan.desc,
              giga: tier.giga,
              gbMin: range.min,
              gbMax: range.max,
              price: tier.price,
              discounts: plan.discounts,
              memo: buildMemo(plan.discounts),
              color,
            });
          });
        });
      });
      return entries;
    }

    const allEntries = buildFlatEntries();

    let currentResults = [];
    let currentSortKey = 'price-asc';
    let hasSearched = false;

    // 検索結果カードへスムーズにスクロールする
    function scrollToResults() {
      document.getElementById('result-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // 「使用状況から選ぶ」「条件を指定して選ぶ」の排他制御
    function onModeToggle(which) {
      const usageCb = document.getElementById('mode-usage');
      const advCb = document.getElementById('mode-advanced');

      if (which === 'usage' && usageCb.checked) {
        advCb.checked = false;
      } else if (which === 'advanced' && advCb.checked) {
        usageCb.checked = false;
      }
      document.getElementById('fieldset-usage').disabled = !usageCb.checked;
      document.getElementById('fieldset-advanced').disabled = !advCb.checked;
    }

    // 使用状況からの簡易検索
    function runUsageSearch(preset) {
      let filtered;
      if (preset === '35plus') {
        filtered = allEntries.filter(e => e.gbMax >= 35);
      } else {
        const t = Number(preset);
        filtered = allEntries.filter(e => e.gbMin <= t && t <= e.gbMax);
      }
      hasSearched = true;
      currentResults = sortEntries(filtered, currentSortKey);
      renderResults();
      scrollToResults();
    }

    function parseNumOrNull(id) {
      const v = document.getElementById(id).value;
      return v === '' ? null : Number(v);
    }

    // 条件を指定しての詳細検索
    function runAdvancedSearch() {
      const selectedCarriers = [...document.querySelectorAll('.carrier-cb:checked')].map(cb => cb.value);
      const gbMin = parseNumOrNull('adv-gb-min');
      const gbMax = parseNumOrNull('adv-gb-max');
      const priceMin = parseNumOrNull('adv-price-min');
      const priceMax = parseNumOrNull('adv-price-max');
      const requiredDiscounts = [...document.querySelectorAll('.discount-cb:checked')].map(cb => cb.value);

      const filtered = allEntries.filter(e => {
        if (selectedCarriers.length > 0 && !selectedCarriers.includes(e.carrier)) return false;
        if (gbMin !== null && e.gbMax < gbMin) return false;
        if (gbMax !== null && e.gbMin > gbMax) return false;
        if (priceMin !== null && e.price < priceMin) return false;
        if (priceMax !== null && e.price > priceMax) return false;
        for (const key of requiredDiscounts) {
          if (!e.discounts[key]) return false;
        }
        return true;
      });

      hasSearched = true;
      currentResults = sortEntries(filtered, currentSortKey);
      renderResults();
      scrollToResults();
    }

    function sortEntries(list, key) {
      const copy = [...list];
      switch (key) {
        case 'price-asc': copy.sort((a, b) => a.price - b.price); break;
        case 'price-desc': copy.sort((a, b) => b.price - a.price); break;
        case 'gb-asc': copy.sort((a, b) => a.gbMax - b.gbMax); break;
        case 'gb-desc': copy.sort((a, b) => b.gbMax - a.gbMax); break;
      }
      return copy;
    }

    function changeSort(key) {
      currentSortKey = key;
      document.querySelectorAll('.sort-btn').forEach(btn =>
        btn.classList.toggle('active', btn.dataset.sort === key));
      currentResults = sortEntries(currentResults, key);
      renderResults();
    }

    function renderResults() {
      const list = document.getElementById('result-list');
      document.getElementById('result-count').textContent = currentResults.length;

      if (!hasSearched) {
        list.innerHTML = '<p class="result-empty">「使用状況から選ぶ」または「条件を指定して選ぶ」で検索すると、ここに結果が表示されます</p>';
        return;
      }

      if (currentResults.length === 0) {
        list.innerHTML = '<p class="result-empty">条件に合うプランが見つかりませんでした</p>';
        return;
      }

      list.innerHTML = currentResults.map(e => `
        <div class="result-card" style="border-left-color:${e.color.accent}; background:${e.color.bg};">
          <span class="result-card-carrier" style="border-color:${e.carrierColor}; color:${e.carrierColor};">${e.carrierLabel}</span>
          <div class="result-card-name">${e.planName}</div>
          <div class="result-card-giga">${e.giga}</div>
          <div class="result-card-price">￥${e.price.toLocaleString()}<span class="unit">/月</span></div>
          <div class="result-card-desc">${e.desc}</div>
          <div class="result-card-memo">${e.memo}</div>
        </div>
      `).join('');
    }

    // 初期起動時
    renderResults();
  </script>
</body>

</html>
